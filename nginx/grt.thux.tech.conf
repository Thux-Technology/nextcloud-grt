server {
    listen 80;
    server_name grt.thux.tech;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name grt.thux.tech;

    ssl_certificate     /etc/letsencrypt/live/grt.thux.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/grt.thux.tech/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        client_max_body_size 10G;

        # Headers de segurança recomendados pelo Nextcloud
        add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer" always;
    }
}
